services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always
    ports:
      - '5432:5432'
    # network_mode: "host"
    # chỉ dùng cho linux
    # docker desktop dùng ports
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis_otp
    restart: always
    ports:
      - '6379:6379'
    # network_mode: "host"
    # chỉ dùng cho linux
    # docker desktop dùng ports

volumes:
  postgres_data:
