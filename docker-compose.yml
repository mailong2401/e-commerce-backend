services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always
    network_mode: "host"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis_otp
    restart: always
    network_mode: "host"

volumes:
  postgres_data:
